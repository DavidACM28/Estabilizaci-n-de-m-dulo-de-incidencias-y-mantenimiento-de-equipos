spring.application.name=andelab-mantenimiento-equipos

spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5433/andelab_mantenimiento}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.time-zone=America/Lima

server.error.include-message=never

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json
springdoc.api-docs.path=/v3/api-docs

app.jwt.secret=${APP_JWT_SECRET:andelab-local-secret-please-change-1234567890-abcdefghijklmnopqrstuv}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:480}
